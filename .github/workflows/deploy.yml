name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml markdown pytest

      - name: Build atom pages
        run: python3 scripts/generate_atom_pages.py

      - name: Build machine-readable catalog (spec.json, compact index, runbooks)
        run: python3 scripts/gen_public_catalog.py

      - name: Build strict per-atom JSON Schema (LLM response_format constraints)
        run: python3 scripts/gen_atom_json_schemas.py

      - name: Compile knowledge atoms (opt-in, unannounced tier)
        run: python3 scripts/gen_knowledge.py

      - name: Dereference discovery document URLs against build output
        run: python3 scripts/check_catalog_links.py

      - name: Enforce project.yaml (visibility policy + declared debt)
        run: python3 -m pytest tests/test_project_manifest.py -q

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}

# atoms/atom-packs.yaml — the COMPLETE atom partition, as A2UI CATALOGS (source of truth).
#
# Every one of the 499 catalogue atoms belongs to exactly one A2UI catalog. Aligned with
# the upstream A2UI multi-catalog model: a host resolves a SET of catalogIds; atoms outside
# the resolved set degrade gracefully. `a2ui-atoms-v1` is the BASE (standard) catalog and is
# ALWAYS resolved; the `a2ui-<name>-v1` catalogs are extension catalogs, resolved on demand.
#
# Naming matches the repo convention (a2ui-atoms-v1, a2ui-state-v1) and Google's catalogId
# pattern. Renamed from ad-hoc pack slugs 2026-07-05. The base folds in 31 former
# "promote" primitives (candidates graduated into core the same day).
#
# Consumed by: scripts/gen_pack_map.py (-> PackMap.gs, the renderer's atom->catalog gate),
# scripts/check_core.py (coverage + lean-host validation), scripts/gen_renderer_manifest.py.
# Edit here, then `ops.py run catalog-rebuild`.
#
# base ALWAYS-resolved: a2ui-atoms-v1  (99 atoms)


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfo Gallery — A2UI Atom Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070910;
  --surface:rgba(255,255,255,0.04);
  --surface-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --text:#f1f5f9;
  --muted:#64748b;
  --dim:#334155;
  font-family:'Google Sans',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text)}

/* background mesh */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% -5%,rgba(99,102,241,.08) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 110%,rgba(16,185,129,.05) 0%,transparent 60%);
  pointer-events:none;
}

/* header */
.gal-header{
  position:fixed;top:0;left:0;right:0;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(7,9,16,0.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  z-index:100;
}
.gal-logo{
  display:flex;align-items:center;gap:10px;
  font-size:.78rem;font-weight:700;color:#94a3b8;letter-spacing:.06em;text-transform:uppercase;
}
.gal-logo-mark{
  width:26px;height:26px;border-radius:7px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.gal-counter{
  font-size:.72rem;font-weight:600;color:var(--muted);
  background:var(--surface);border:1px solid var(--border);
  padding:4px 10px;border-radius:20px;letter-spacing:.04em;
}

/* stage */
.gal-stage{
  position:fixed;inset:52px 0 0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* card */
.gal-card{
  position:absolute;
  width:min(560px,88vw);
  background:rgba(12,14,22,0.9);
  border:1px solid var(--border);
  border-radius:20px;
  padding:36px 38px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset;
  transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .28s ease;
  cursor:default;
  user-select:none;
}
.gal-card.active{transform:translateX(0);opacity:1}
.gal-card.prev{transform:translateX(-110vw);opacity:0;pointer-events:none}
.gal-card.next{transform:translateX(110vw);opacity:0;pointer-events:none}
.gal-card.exit-left{transform:translateX(-110vw);opacity:0;transition:transform .28s ease,opacity .18s ease}
.gal-card.exit-right{transform:translateX(110vw);opacity:0;transition:transform .28s ease,opacity .18s ease}
.gal-card.enter-left{transform:translateX(-110vw);opacity:0;transition:none}
.gal-card.enter-right{transform:translateX(110vw);opacity:0;transition:none}

/* card inner */
.gal-cat{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;margin-bottom:20px;
}
.gal-icon-row{display:flex;align-items:flex-start;gap:18px;margin-bottom:20px}
.gal-icon{
  width:60px;height:60px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:28px;
}
.gal-meta{flex:1}
.gal-title{font-size:1.35rem;font-weight:700;line-height:1.2;color:#f1f5f9;margin-bottom:4px}
.gal-sub{font-size:.8rem;font-weight:500;color:var(--muted)}
.gal-desc{font-size:.84rem;line-height:1.6;color:#94a3b8;margin-bottom:20px}
.gal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.gal-tag{
  font-size:.66rem;font-weight:600;letter-spacing:.04em;
  padding:3px 9px;border-radius:6px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  color:#94a3b8;
}
.gal-open{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 20px;border-radius:11px;
  font-size:.82rem;font-weight:700;
  text-decoration:none;
  transition:all .15s;
  border:1px solid transparent;
}
.gal-open:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.gal-open svg{transition:transform .15s}
.gal-open:hover svg{transform:translateX(3px)}

/* nav arrows */
.gal-nav{
  position:fixed;top:50%;transform:translateY(-50%);
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#94a3b8;
  transition:all .15s;z-index:50;
  backdrop-filter:blur(8px);
}
.gal-nav:hover{background:rgba(255,255,255,0.1);color:#f1f5f9;border-color:rgba(255,255,255,0.18)}
.gal-nav-l{left:20px}
.gal-nav-r{right:20px}
.gal-nav svg{width:18px;height:18px}

/* dots */
.gal-dots{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:7px;z-index:50;
}
.gal-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.18);
  cursor:pointer;transition:all .2s;
}
.gal-dot.active{width:20px;border-radius:4px}

/* colour themes per app */
.theme-red   .gal-cat{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.18)}
.theme-red   .gal-icon{background:rgba(239,68,68,.12)}
.theme-red   .gal-dot.active,.theme-red .gal-open{background:#dc2626;color:#fff}
.theme-red   .gal-card{border-color:rgba(239,68,68,.12)}

.theme-indigo .gal-cat{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.18)}
.theme-indigo .gal-icon{background:rgba(99,102,241,.12)}
.theme-indigo .gal-dot.active,.theme-indigo .gal-open{background:#4f46e5;color:#fff}
.theme-indigo .gal-card{border-color:rgba(99,102,241,.12)}

.theme-purple .gal-cat{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.18)}
.theme-purple .gal-icon{background:rgba(168,85,247,.12)}
.theme-purple .gal-dot.active,.theme-purple .gal-open{background:#7c3aed;color:#fff}
.theme-purple .gal-card{border-color:rgba(168,85,247,.12)}

.theme-blue  .gal-cat{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.18)}
.theme-blue  .gal-icon{background:rgba(59,130,246,.12)}
.theme-blue  .gal-dot.active,.theme-blue .gal-open{background:#2563eb;color:#fff}
.theme-blue  .gal-card{border-color:rgba(59,130,246,.12)}

.theme-green .gal-cat{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.18)}
.theme-green .gal-icon{background:rgba(16,185,129,.12)}
.theme-green .gal-dot.active,.theme-green .gal-open{background:#059669;color:#fff}
.theme-green .gal-card{border-color:rgba(16,185,129,.12)}

.theme-cyan  .gal-cat{background:rgba(6,182,212,.12);color:#22d3ee;border:1px solid rgba(6,182,212,.18)}
.theme-cyan  .gal-icon{background:rgba(6,182,212,.12)}
.theme-cyan  .gal-dot.active,.theme-cyan .gal-open{background:#0891b2;color:#fff}
.theme-cyan  .gal-card{border-color:rgba(6,182,212,.12)}

.theme-amber .gal-cat{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.18)}
.theme-amber .gal-icon{background:rgba(245,158,11,.12)}
.theme-amber .gal-dot.active,.theme-amber .gal-open{background:#d97706;color:#fff}
.theme-amber .gal-card{border-color:rgba(245,158,11,.12)}

.theme-teal  .gal-cat{background:rgba(20,184,166,.12);color:#2dd4bf;border:1px solid rgba(20,184,166,.18)}
.theme-teal  .gal-icon{background:rgba(20,184,166,.12)}
.theme-teal  .gal-dot.active,.theme-teal .gal-open{background:#0d9488;color:#fff}
.theme-teal  .gal-card{border-color:rgba(20,184,166,.12)}
</style>
</head>

var current = 0;
var stage = document.getElementById('stage');
var dotsEl = document.getElementById('dots');
var counter = document.getElementById('counter');
var busy = false;

function buildCard(app, cls) {
  var url = BASE + '?p=' + app.p;
  var tags = app.tags.map(function(t){ return '<span class="gal-tag">'+t+'</span>'; }).join('');
  var el = document.createElement('div');
  el.className = 'gal-card theme-'+app.theme+' '+cls;
  el.innerHTML =
    '<span class="gal-cat">'+app.cat+'</span>'+
    '<div class="gal-icon-row">'+
      '<div class="gal-icon">'+app.icon+'</div>'+
      '<div class="gal-meta">'+
        '<div class="gal-title">'+app.title+'</div>'+
        '<div class="gal-sub">'+app.sub+'</div>'+
      '</div>'+
    '</div>'+
    '<p class="gal-desc">'+app.desc+'</p>'+
    '<div class="gal-tags">'+tags+'</div>'+
    '<a class="gal-open" href="'+url+'" target="_top">'+
      'Open Demo'+
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>'+
    '</a>';
  return el;
}

function buildDots() {
  dotsEl.innerHTML = '';
  APPS.forEach(function(_, i) {
    var d = document.createElement('div');
    d.className = 'gal-dot theme-'+APPS[current].theme + (i===current?' active':'');
    d.addEventListener('click', function(){ if(!busy) goTo(i); });
    dotsEl.appendChild(d);
  });
}

function updateDots() {
  var ds = dotsEl.querySelectorAll('.gal-dot');
  ds.forEach(function(d,i){
    d.className = 'gal-dot' + (i===current?' active theme-'+APPS[current].theme:'');
  });
}

function goTo(idx, dir) {
  if (busy || idx === current) return;
  busy = true;
  var direction = (dir !== undefined) ? dir : (idx > current ? 1 : -1);
  var prev = current;
  current = (idx + APPS.length) % APPS.length;

  var oldCard = stage.querySelector('.gal-card.active');
  var newCard = buildCard(APPS[current], direction > 0 ? 'enter-right' : 'enter-left');
  stage.appendChild(newCard);

  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      if (oldCard) oldCard.classList.replace('active', direction > 0 ? 'exit-left' : 'exit-right');
      newCard.classList.remove('enter-left','enter-right');
      newCard.classList.add('active');
      counter.textContent = (current+1)+' / '+APPS.length;
      updateDots();
      setTimeout(function(){
        if (oldCard && oldCard.parentNode) oldCard.parentNode.removeChild(oldCard);
        busy = false;
      }, 380);
    });
  });
}

function init() {
  var card = buildCard(APPS[0], 'active');
  stage.appendChild(card);
  buildDots();
  counter.textContent = '1 / '+APPS.length;
}

document.getElementById('btnPrev').addEventListener('click', function(){ goTo(current-1,-1); });
document.getElementById('btnNext').addEventListener('click', function(){ goTo(current+1, 1); });

document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowLeft') goTo(current-1,-1);
  else if (e.key==='ArrowRight') goTo(current+1, 1);
});

// swipe
var touchX = 0;
stage.addEventListener('touchstart', function(e){ touchX = e.touches[0].clientX; }, {passive:true});
stage.addEventListener('touchend', function(e){
  var dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) goTo(dx < 0 ? current+1 : current-1, dx < 0 ? 1 : -1);
}, {passive:true});

init();
</script>

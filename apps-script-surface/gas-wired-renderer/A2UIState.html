<script>
// ─── A2UI State Engine ────────────────────────────────────────────────────────
// Client-side reactive state graph. Injected only for a2ui_wired_surface payloads.

var VALID_ID = /^[a-zA-Z0-9_-]+$/;
var MAX_PATTERN_LENGTH = 200;
// ─── Action transport (spec/wired-transport-v0.1.md, a2ui-private) ───────────
// Selected by CAPABILITY, never by payload flag: gas (google.script.run) →
// host (JSON-RPC tools/call over the MCP Apps bridge; sheet verbs map onto the
// worker's store_* tools) → none (DECLARED error state — never a dead button).
function _a2uiActionTransport(type, req, onOk, onFail) {
  // Detect the REAL GAS client, not the RunChain polyfill AtomScripts ships
  // for web hosts (it implements fetchDataSource but NOT a2uiAction — routing
  // on `google.script.run` alone threw inside the view, 2026-07-11).
  if (typeof google !== 'undefined' && google.script && google.script.run &&
      typeof google.script.run.a2uiAction === 'function') {
    google.script.run.withSuccessHandler(onOk).withFailureHandler(onFail)
      .a2uiAction(type, req);
    return;
  }
  if (window._A2UI_HOST_BRIDGE && typeof window._A2UI_HOST_BRIDGE.callTool === 'function') {
    var VERBS = { 'gas:sheet_append': 'store_append',
                  'gas:sheet_query':  'store_read',
                  'gas:sheet_clear':  'store_clear' };
    var tool = VERBS[type];
    if (!tool) {
      onOk({ ok: false, error: 'Verb ' + type + ' has no host transport — this action needs the Apps Script surface.' });
      return;
    }
    // Session isolation (wired-transport v0.1.1): the host injects
    // app.session from the link's &t= token — one link, one tournament.
    // No token = the app's shared default store (backward compatible).
    var store = 'wired:' + ((req.appConfig && req.appConfig.id) || 'app') +
                ((req.appConfig && req.appConfig.session) ? ':' + req.appConfig.session : '') +
                ':' + ((req.config && req.config.sheet) || 'data');
    var args = tool === 'store_append' ? { store: store, record: req.data }
             : tool === 'store_clear'  ? { store: store }
             : { store: store, limit: 500 };
    window._A2UI_HOST_BRIDGE.callTool(tool, args).then(function(res) {
      onOk((res && res.structuredContent) || { ok: false, error: 'empty host response' });
    })['catch'](function(e) { onFail(e); });
    return;
  }
  onOk({ ok: false, error: 'This app needs a backend this host cannot reach — its buttons are inert here.' });
}

var OUTPUT_WIRE_PROPS = { onChange: 1, onClick: 1, onToggle: 1, onRowClick: 1, onFlightClick: 1, onSearch: 1, onAssign: 1, setDone: 1 };

function A2UIStateEngine(spec) {
  this.nodes     = {};
  this.listeners = {};
  this._initPrimitives(spec.state_primitives || []);
  this._initActions(spec.actions || []);
  this._resolveWires(spec.state_primitives || [], spec.actions || []);
}

A2UIStateEngine.prototype._validateId = function(id) {
  if (!VALID_ID.test(id)) throw new Error('[A2UI] Invalid node ID: "' + id + '"');
};

A2UIStateEngine.prototype._parseWire = function(expr) {
  var inner = expr.slice(1);
  var dot = inner.indexOf('.');
  if (dot === -1) { console.warn('[A2UI] Malformed wire: "' + expr + '"'); return null; }
  return { nodeId: inner.slice(0, dot), property: inner.slice(dot + 1) };
};

A2UIStateEngine.prototype._set = function(nodeId, property, value) {
  var node = this.nodes[nodeId];
  if (!node) return;
  node[property] = value;
  // Persist done-states: a ValueStore marked persist:true, keyed by page slug +
  // identity. Skipped during hydration (no echo) and when no slug (encoded ?p=).
  if (property === 'value' && node._persist && !this._hydrating &&
      window._A2UI_SLUG && typeof google !== 'undefined' && google.script && google.script.run) {
    try {
      google.script.run
        .withFailureHandler(function () {})
        .a2uiSaveProgress(window._A2UI_SLUG, window._A2UI_CLIENT_ID || '', nodeId, value);
    } catch (e) {}
  }
  var key = nodeId + ':' + property;
  var cbs = this.listeners[key] || [];
  for (var i = 0; i < cbs.length; i++) cbs[i](value);
  // Auto-unpack plain objects — fires sub-property events so #node.callsign / #action.meetLink etc. work
  if ((property === 'value' || property === 'result') && value !== null && typeof value === 'object' && !Array.isArray(value)) {
    var self = this;
    Object.keys(value).forEach(function(k) {
      node[k] = value[k];
      var subKey = nodeId + ':' + k;
      var subCbs = self.listeners[subKey] || [];
      for (var j = 0; j < subCbs.length; j++) subCbs[j](value[k]);
    });
  }
};

A2UIStateEngine.prototype.registerListener = function(nodeId, property, callback) {
  var node = this.nodes[nodeId];
  if (!node) { console.warn('[A2UI] Wire target "' + nodeId + '" not found'); return; }
  // Property may not exist yet (e.g. object sub-properties set later via setValue)
  if (!(property in node)) { console.warn('[A2UI] Node "' + nodeId + '" has no property "' + property + '" yet'); }
  var key = nodeId + ':' + property;
  if (!this.listeners[key]) this.listeners[key] = [];
  this.listeners[key].push(callback);
  if (property in node) callback(node[property]);
};

// ── A2UI v1.0 incremental-update bridge (client-receive half) ────────────────────
// Applies a received `updateDataModel` message onto the reactive graph. A2UI's
// dataModel path `/<nodeId>[/sub...]` maps onto a ValueStore (the wired-emitter
// contract: dataModel <-> ValueStore) — top-level path sets the store value, a
// deeper path patches into its object value; omitted value removes the leaf. The
// _set then fires listeners and the wired atoms repaint. Feed it messages from the
// live_refresh poll (compliant pull, via A2uiUpdates.pollResultToUpdate) or a push
// channel. `updateComponents`/`deleteSurface` are structural and not supported by
// the static-layout engine at runtime (returns false — the A2uiUpdates mirror
// state still tracks them for an A2UI-native host). Reference semantics +
// parity tests: renderers/a2ui_v1_updates.py, scripts/test_a2ui_updates_js.mjs.
A2UIStateEngine.prototype.applyA2uiUpdate = function(msg) {
  if (!msg || !msg.updateDataModel) return false;
  var ud = msg.updateDataModel;
  var toks = String(ud.path || '/').replace(/^\//, '').split('/')
    .filter(function (t) { return t.length; })
    .map(function (t) { return t.replace(/~1/g, '/').replace(/~0/g, '~'); });
  if (!toks.length) return false;                 // whole-model replace: no single store target
  var nodeId = toks[0];
  if (!this.nodes[nodeId]) return false;
  if (toks.length === 1) {
    this._set(nodeId, 'value', ('value' in ud) ? ud.value : null);
  } else {
    var node = this.nodes[nodeId];
    var base = (node.value && typeof node.value === 'object') ? JSON.parse(JSON.stringify(node.value)) : {};
    var t = base;
    for (var i = 1; i < toks.length - 1; i++) { if (typeof t[toks[i]] !== 'object') t[toks[i]] = {}; t = t[toks[i]]; }
    if ('value' in ud) t[toks[toks.length - 1]] = ud.value; else delete t[toks[toks.length - 1]];
    this._set(nodeId, 'value', base);
  }
  return true;
};

A2UIStateEngine.prototype.trigger = function(nodeId, inputName, value) {
  var node = this.nodes[nodeId];
  if (!node) { console.warn('[A2UI] Wire target "' + nodeId + '" not found'); return; }
  var handler = node['_' + inputName];
  if (typeof handler !== 'function') { console.warn('[A2UI] "' + nodeId + '" has no input "' + inputName + '"'); return; }
  handler(value);
};

A2UIStateEngine.prototype.compileWires = function(layoutEl, domBridge) {
  if (!layoutEl.wire || !layoutEl.id) return;
  var self = this;
  var wire = layoutEl.wire;
  Object.keys(wire).forEach(function(propName) {
    if (OUTPUT_WIRE_PROPS[propName]) return;
    var wireExpr = wire[propName];
    if (typeof wireExpr !== 'string' || !wireExpr.startsWith('#')) return;
    var parsed = self._parseWire(wireExpr);
    if (!parsed) return;
    self.registerListener(parsed.nodeId, parsed.property, function(val) {
      // Deliver RAW: text/value sinks assign via textContent/.value (escaping
      // here shows literal &amp;), and every innerHTML sink sanitizes per-cell.
      domBridge.setProp(layoutEl.id, propName, val);
    });
  });
};

A2UIStateEngine.prototype.bindOutput = function(wireExpr, eventValue) {
  if (typeof wireExpr !== 'string' || !wireExpr.startsWith('#')) { console.warn('[A2UI] Malformed output wire: "' + wireExpr + '"'); return; }
  var parsed = this._parseWire(wireExpr);
  if (!parsed) return;
  this.trigger(parsed.nodeId, parsed.property, eventValue);
};

// ─── Primitives ───────────────────────────────────────────────────────────────

A2UIStateEngine.prototype._initPrimitives = function(primitives) {
  var self = this;
  primitives.forEach(function(p) {
    self._validateId(p.id);
    switch (p.primitive) {
      case 'ValueStore':       self._initValueStore(p);       break;
      case 'ArrayFilter':      self._initArrayFilter(p);      break;
      case 'StringValidator':  self._initStringValidator(p);  break;
      case 'NumericThreshold': self._initNumericThreshold(p); break;
      case 'StepNavigator':    self._initStepNavigator(p);    break;
      case 'Computed':         self._initComputed(p);         break;
      case 'Timer':            self._initTimer(p);            break;
      case 'DerivedStore':    self._initDerivedStore(p);     break;
      case 'StringTemplate':   self._initStringTemplate(p);   break;
      case 'RowBinder':        self._initRowBinder(p);        break;
      default: console.warn('[A2UI] Unknown primitive: "' + p.primitive + '"');
    }
  });
};

A2UIStateEngine.prototype._resolveWires = function(primitives, actions) {
  var self = this;

  primitives.forEach(function(p) {
    var node = self.nodes[p.id];
    if (!node) return;

    if (typeof (p.props && p.props.source) === 'string' && p.props.source.startsWith('#')) {
      var parsed = self._parseWire(p.props.source);
      if (parsed) {
        self.registerListener(parsed.nodeId, parsed.property, function(val) {
          if (node._recompute) node._recompute(val);
        });
      }
    }

    // Timer outbound wires — when tick fires, trigger the target node's input
    if (p.primitive === 'Timer' && p.wire) {
      Object.keys(p.wire).forEach(function(myProp) {
        var wireExpr = p.wire[myProp];
        if (typeof wireExpr !== 'string' || !wireExpr.startsWith('#')) return;
        var parsed = self._parseWire(wireExpr);
        if (!parsed) return;
        self.registerListener(p.id, myProp, function(val) {
          self.trigger(parsed.nodeId, parsed.property, val);
        });
      });
      return;
    }

    if (p.primitive === 'Computed' && p.props && p.props.inputs) {
      var inputSpec = p.props.inputs;
      Object.keys(inputSpec).forEach(function(varName) {
        var wireExpr = inputSpec[varName];
        if (typeof wireExpr !== 'string' || !wireExpr.startsWith('#')) return;
        var parsed = self._parseWire(wireExpr);
        if (!parsed) return;
        self.registerListener(parsed.nodeId, parsed.property, function(val) {
          node._vars[varName] = isNaN(Number(val)) ? 0 : Number(val);
          node._recompute();
        });
      });
    }

    if (p.primitive === 'StringTemplate' && p.props && p.props.inputs) {
      var stSpec = p.props.inputs;
      Object.keys(stSpec).forEach(function(varName) {
        var stExpr = stSpec[varName];
        if (typeof stExpr !== 'string' || !stExpr.startsWith('#')) return;
        var stParsed = self._parseWire(stExpr);
        if (!stParsed) return;
        self.registerListener(stParsed.nodeId, stParsed.property, function(val) {
          var stNode = self.nodes[p.id];
          stNode._vars[varName] = (val === null || val === undefined) ? '' : String(val);
          stNode._recompute();
        });
      });
    }

    if (p.wire) {
      Object.keys(p.wire).forEach(function(inputName) {
        var wireExpr = p.wire[inputName];
        if (typeof wireExpr !== 'string' || !wireExpr.startsWith('#')) return;
        var parsed = self._parseWire(wireExpr);
        if (!parsed) return;
        self.registerListener(parsed.nodeId, parsed.property, function(val) {
          if (p.primitive === 'ArrayFilter') {
            if (inputName === 'query')  { node._query = val;                          node._recompute(); }
            if (inputName === 'source') { node._sourceData = Array.isArray(val) ? val : []; node._recompute(); }
          } else if (p.primitive === 'RowBinder' && inputName === 'rows') {
            node._apply(Array.isArray(val) ? val : []);
          } else {
            self.trigger(p.id, inputName, val);
          }
        });
      });
    }
  });

  // Route action output wires into the state graph
  (actions || []).forEach(function(p) {
    if (!p.wire) return;
    var node = self.nodes[p.id];
    if (!node) return;
    Object.keys(p.wire).forEach(function(outputProp) {
      var wireExpr = p.wire[outputProp];
      if (typeof wireExpr !== 'string' || !wireExpr.startsWith('#')) return;
      var parsed = self._parseWire(wireExpr);
      if (!parsed) return;
      var targetNode = self.nodes[parsed.nodeId];
      if (!targetNode) { console.warn('[A2UI] Action wire target "' + parsed.nodeId + '" not found'); return; }
      self.registerListener(p.id, outputProp, function(val) {
        if (val === null || val === undefined) return;
        if (parsed.property === 'source' && typeof targetNode._recompute === 'function') {
          targetNode._sourceData = Array.isArray(val) ? val : [];
          targetNode._recompute();
        } else {
          self.trigger(parsed.nodeId, parsed.property, val);
        }
      });
    });
  });
};

A2UIStateEngine.prototype._initValueStore = function(p) {
  var self = this;
  var init = (p.props && p.props.initialValue !== undefined) ? p.props.initialValue : null;
  var node = { value: init, _initialValue: init, _persist: !!(p.props && p.props.persist) };
  node._setValue = function(val) { self._set(p.id, 'value', val); };
  this.nodes[p.id] = node;
};

A2UIStateEngine.prototype._initArrayFilter = function(p) {
  var self = this;
  var filterKey = (p.props && p.props.filterKey) || 'label';
  var staticSrc = (p.props && Array.isArray(p.props.source)) ? p.props.source : [];
  var node = { output: staticSrc.slice(), _sourceData: staticSrc, _query: '' };
  node._recompute = function() {
    var q   = (node._query || '').toLowerCase().trim();
    var src = Array.isArray(node._sourceData) ? node._sourceData : [];
    var result = q
      ? src.filter(function(item) { return String(item[filterKey] || '').toLowerCase().indexOf(q) !== -1; })
      : src.slice();
    self._set(p.id, 'output', result);
  };
  this.nodes[p.id] = node;
};

A2UIStateEngine.prototype._initStringValidator = function(p) {
  var self   = this;
  var raw    = (p.props && p.props.pattern) || '';
  var errMsg = (p.props && p.props.errorMessage) || 'Invalid value';
  var pattern;
  if (raw.length > MAX_PATTERN_LENGTH) {
    console.warn('[A2UI] StringValidator "' + p.id + '" pattern too long — using passthrough');
    pattern = /.*/;
  } else {
    try { pattern = new RegExp(raw); } catch(e) {
      console.warn('[A2UI] StringValidator "' + p.id + '" bad pattern — using passthrough');
      pattern = /.*/;
    }
  }
  // isInvalid: typed something that doesn't match (show format error)
  // isNotValid: empty OR invalid (gate submit button)
  var node = { isValid: false, isNotValid: true, isInvalid: false, errorMessage: '' };
  node._recompute = function(source) {
    var notEmpty = typeof source === 'string' && source.length > 0;
    var valid    = notEmpty && pattern.test(source);
    var invalid  = notEmpty && !pattern.test(source);
    self._set(p.id, 'isValid',       valid);
    self._set(p.id, 'isNotValid',    !valid);
    self._set(p.id, 'isInvalid',     invalid);
    self._set(p.id, 'errorMessage',  invalid ? errMsg : '');
  };
  this.nodes[p.id] = node;
};

A2UIStateEngine.prototype._initNumericThreshold = function(p) {
  var self = this;
  var ops  = { gt: function(a,b){return a>b;}, gte: function(a,b){return a>=b;},
               lt: function(a,b){return a<b;}, lte: function(a,b){return a<=b;},
               eq: function(a,b){return a===b;} };
  var compare   = ops[(p.props && p.props.operator)] || ops.gte;
  var threshold = (p.props && p.props.threshold !== undefined) ? p.props.threshold : 0;
  var node = { isTriggered: false, isNotTriggered: true };
  node._recompute = function(source) {
    var triggered = compare(Number(source), threshold);
    self._set(p.id, 'isTriggered',    triggered);
    self._set(p.id, 'isNotTriggered', !triggered);
  };
  this.nodes[p.id] = node;
};

A2UIStateEngine.prototype._initStepNavigator = function(p) {
  var self  = this;
  var total = (p.props && p.props.totalSteps) || 2;
  var node  = { activeIndex: 0 };
  node._next   = function()  { if (node.activeIndex < total-1) self._set(p.id, 'activeIndex', node.activeIndex+1); };
  node._prev   = function()  { if (node.activeIndex > 0)       self._set(p.id, 'activeIndex', node.activeIndex-1); };
  node._jumpTo = function(i) { if (i >= 0 && i < total)        self._set(p.id, 'activeIndex', i); };
  this.nodes[p.id] = node;
};

A2UIStateEngine.prototype._initTimer = function(p) {
  var self     = this;
  var interval = (p.props && p.props.interval) || 10000;
  var node     = { tick: 0 };
  this.nodes[p.id] = node;
  // Start after one event-loop tick so all nodes exist before first fire
  setTimeout(function() {
    setInterval(function() { self._set(p.id, 'tick', ++node.tick); }, interval);
  }, 0);
};

A2UIStateEngine.prototype._initDerivedStore = function(p) {
  var self     = this;
  var props    = p.props || {};
  var fromRef  = props.from  || '';   // e.g. "#incidents_query.result"
  var expr     = props.expr  || '';
  var addCols  = props.add   || [];   // for augment_rows
  var interval = props.interval || 0;

  var node = expr === 'scalar'
    ? { result: [], elapsed_sec: 0, elapsed_fmt: '0s', sla_state: 'ok' }
    : { result: [] };
  this.nodes[p.id] = node;

  // Parse #store.field reference
  function parseRef(ref) {
    var m = String(ref).match(/^#([^.]+)\.(.+)$/);
    return m ? { store: m[1], field: m[2] } : null;
  }

  // ── Sub-op helpers ──────────────────────────────────────────────────────────
  function opElapsedSeconds(row, colDef) {
    var raw = row[colDef.field];
    if (!raw) return 0;
    var t = new Date(raw).getTime();
    if (isNaN(t)) return 0;
    return Math.floor((Date.now() - t) / 1000);
  }

  function opFormatDuration(row, colDef) {
    var sec = row[colDef.src];
    if (typeof sec !== 'number' || sec < 0) return '--';
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = sec % 60;
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm ' + s + 's';
    return s + 's';
  }

  function opThresholdByField(row, colDef) {
    var sec        = row[colDef.src];
    var keyField   = colDef.key;
    var keyVal     = row[keyField];
    var thresholds = (colDef.thresholds || {})[keyVal] || {};
    var warn   = thresholds.warn   || Infinity;
    var breach = thresholds.breach || Infinity;
    if (typeof sec !== 'number') return 'ok';
    if (sec >= breach) return 'breach';
    if (sec >= warn)   return 'warn';
    return 'ok';
  }

  // ── row arithmetic ops (trading: P&L etc.) ──────────────────────────────────
  function opMultiplyDiff(row, colDef) {
    var a = parseFloat(row[colDef.a]), b = parseFloat(row[colDef.b]);
    var by = colDef.by ? parseFloat(row[colDef.by]) : 1;
    if (isNaN(a) || isNaN(b) || isNaN(by)) return null;
    return Math.round((a - b) * by * 100) / 100;
  }
  function opPctDiff(row, colDef) {
    var a = parseFloat(row[colDef.a]), b = parseFloat(row[colDef.b]);
    if (isNaN(a) || isNaN(b) || b === 0) return null;
    return Math.round((a - b) / b * 10000) / 100;
  }
  function opSignalThreshold(row, colDef) {
    var v = parseFloat(row[colDef.src]);
    if (isNaN(v) || v === null) return '';
    if (v >= (colDef.high !== undefined ? colDef.high : 70)) return colDef.above || 'overbought';
    if (v <= (colDef.low  !== undefined ? colDef.low  : 30)) return colDef.below || 'oversold';
    return colDef.mid || 'neutral';
  }

  // ── rolling-window series ops (computed once per recompute, joined by index) ─
  function seriesValues(rows, src) {
    return rows.map(function(r) { var v = parseFloat(r[src]); return isNaN(v) ? null : v; });
  }
  function seriesSma(vals, n) {
    return vals.map(function(_, i) {
      if (i < n - 1) return null;
      var sum = 0;
      for (var j = i - n + 1; j <= i; j++) { if (vals[j] === null) return null; sum += vals[j]; }
      return Math.round(sum / n * 100) / 100;
    });
  }
  function seriesRsi(vals, n) {
    // Wilder's smoothing, classic RSI
    var out = vals.map(function() { return null; });
    if (vals.length <= n) return out;
    var avgGain = 0, avgLoss = 0;
    for (var i = 1; i <= n; i++) {
      var d = vals[i] - vals[i - 1];
      if (d >= 0) avgGain += d; else avgLoss -= d;
    }
    avgGain /= n; avgLoss /= n;
    out[n] = avgLoss === 0 ? 100 : Math.round((100 - 100 / (1 + avgGain / avgLoss)) * 100) / 100;
    for (var k = n + 1; k < vals.length; k++) {
      var dk = vals[k] - vals[k - 1];
      avgGain = (avgGain * (n - 1) + Math.max(dk, 0)) / n;
      avgLoss = (avgLoss * (n - 1) + Math.max(-dk, 0)) / n;
      out[k] = avgLoss === 0 ? 100 : Math.round((100 - 100 / (1 + avgGain / avgLoss)) * 100) / 100;
    }
    return out;
  }
  function seriesBband(vals, n, mult, side) {
    return vals.map(function(_, i) {
      if (i < n - 1) return null;
      var sum = 0, j;
      for (j = i - n + 1; j <= i; j++) { if (vals[j] === null) return null; sum += vals[j]; }
      var mean = sum / n, varsum = 0;
      for (j = i - n + 1; j <= i; j++) varsum += (vals[j] - mean) * (vals[j] - mean);
      var sd = Math.sqrt(varsum / n);
      return Math.round((mean + (side === 'lower' ? -1 : 1) * (mult || 2) * sd) * 100) / 100;
    });
  }
  var SERIES_OPS = { sma: 1, rsi: 1, bband_upper: 1, bband_lower: 1 };

  // ── scalar: elapsed time from app load — no source array needed ────────────
  var startMs = Date.now();
  function scalarDuration(sec) {
    var h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    return h > 0 ? h + 'h ' + m + 'm' : m > 0 ? m + 'm ' + s + 's' : s + 's';
  }
  function recomputeScalar() {
    var sec     = Math.floor((Date.now() - startMs) / 1000);
    var thresh  = props.thresholds || {};
    var warn    = thresh.warn   || Infinity;
    var breach  = thresh.breach || Infinity;
    var state   = sec >= breach ? 'breach' : sec >= warn ? 'warn' : 'ok';
    self._set(p.id, 'elapsed_sec', sec);
    self._set(p.id, 'elapsed_fmt', scalarDuration(sec));
    self._set(p.id, 'sla_state',   state);
  }

function _a2uiSafeExpr(expr, vars) {

      + '</div>';

  // Fire onAssign into the engine
  var elId = el.id.replace('a2ui-', '');
  var schema = window.__A2UI_SCHEMA__;
  if (schema && window._a2uiEngine) {
    var layoutEl;
    for (var i = 0; i < (schema.layout||[]).length; i++) {
      if (schema.layout[i].id === elId) { layoutEl = schema.layout[i]; break; }
    }
    if (layoutEl && layoutEl.wire && layoutEl.wire.onAssign) {
      var ref = window._a2uiEngine._parseWire(layoutEl.wire.onAssign);
      if (ref) window._a2uiEngine._set(ref.nodeId, ref.property, person);

}

function _a2uiClearPicker(elId) {

  if (ppSearch) ppSearch.style.display = '';
  var elSchema = window.__A2UI_SCHEMA__;
  if (elSchema && window._a2uiEngine) {
    var lEl;
    for (var j = 0; j < (elSchema.layout||[]).length; j++) {

function _a2uiRenderSurfaceAvatars(container, users, surfaceId, guardSheet) {
  var html = '';
  users.forEach(function(u, i) {
    var name     = u.name || u.email || '?';
    var hasAccess = u.hasAccess !== false; // default true if not set
    var ml       = i === 0 ? '0' : (hasAccess ? '-6px' : '0');

    if (hasAccess) {
      // Normal avatar
      if (u.photoUrl) {
        html += '<img src="' + _a2uiSanitize(u.photoUrl) + '" title="' + _a2uiSanitize(name) + '" style="width:28px;height:28px;border-radius:50%;border:2px solid #1e293b;margin-left:' + ml + ';object-fit:cover;">';
      } else {
        var initials = _a2uiInitials(name);
        var color    = _a2uiHashColor(u.email || name);
        html += '<div title="' + _a2uiSanitize(name + (u.email ? ' · ' + u.email : '')) + '"'
             + ' style="width:28px;height:28px;border-radius:50%;border:2px solid #1e293b;margin-left:' + ml + ';'
             + 'background:' + color + ';display:inline-flex;align-items:center;justify-content:center;'
             + 'font-size:11px;font-weight:700;color:#fff;flex-shrink:0;cursor:default;">'
             + _a2uiSanitize(_a2uiInitials(name)) + '</div>';
      }
    } else {
      // No-access pill: avatar + name + ⚠ + Grant button
      var initials = _a2uiInitials(name);
      var color    = _a2uiHashColor(u.email || name);
      var safeEmail = _a2uiSanitize(u.email || '');
      var safeName  = _a2uiSanitize(name);
      html += '<div style="display:inline-flex;align-items:center;gap:5px;background:#fef3c7;border:1px solid #f59e0b;border-radius:20px;padding:2px 8px 2px 3px;font-size:11px;">'
            + '<div style="width:22px;height:22px;border-radius:50%;background:' + color + ';display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;">' + _a2uiSanitize(initials) + '</div>'
            + '<span style="color:#92400e;font-weight:500;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + safeEmail + '">' + safeName + '</span>'
            + '<span style="color:#f59e0b;font-size:13px;" title="No sheet access">⚠</span>'
            + '<button data-grant-email="' + safeEmail + '" data-grant-surface="' + _a2uiSanitize(surfaceId || '') + '" data-grant-sheet="' + _a2uiSanitize(guardSheet || '') + '"'
            + ' style="background:#f59e0b;color:#fff;border:none;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;">Grant access</button>'
            + '</div>';
    }
  });
  container.innerHTML = html;

  // Wire Grant buttons
  container.querySelectorAll('button[data-grant-email]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var email   = btn.getAttribute('data-grant-email');
      var surface = btn.getAttribute('data-grant-surface');
      var sheet   = btn.getAttribute('data-grant-sheet');
      btn.disabled = true;
      btn.textContent = '…';
      google.script.run
        .withSuccessHandler(function(r) {
          btn.textContent = r && r.ok ? '✓' : '✗';
          setTimeout(function() {
            // Re-query to refresh the pill state
            google.script.run
              .withSuccessHandler(function(qr) {
                if (qr && qr.ok) _a2uiRenderSurfaceAvatars(container, qr.data || [], surface, sheet);
              })
              .a2uiSurfacePresence('query', { surface_id: surface, threshold: 90 });
          }, 1200);
        })
        .withFailureHandler(function() { btn.textContent = '✗'; btn.disabled = false; })
        .a2uiSurfacePresence('grant', { surface_id: surface, email: email, sheet: sheet });
    });
  });
}

function _a2uiInitials(name) {
  var parts = name.trim().split(/[\s@._-]+/).filter(Boolean);
  return (parts[0] ? parts[0][0].toUpperCase() : '?') + (parts[1] ? parts[1][0].toUpperCase() : '');
}

function _a2uiHashColor(str) {
  var palette = ['#6366f1','#8b5cf6','#ec4899','#f97316','#14b8a6','#06b6d4','#3b82f6','#ef4444'];
  var h = 0;
  for (var i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xfffffff;
  return palette[h % palette.length];
}

          + 'title="Delete row" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:1.1rem;line-height:1;padding:2px 4px;">🗑</button>'
          + '</td>';
      } else if (key === '_claim') {
        var claimKey   = col.claim_key   || 'id';
        var emailKey   = col.email_key   || 'owner_email';
        var nameKey    = col.name_key    || 'owner_name';
        var actNode    = col.action_node  || 'claim_action';
        var keyMemNode = col.key_mem_node || 'incident_id_mem';
        var ownerEmail = String(row[emailKey] || '');
        var ownerName  = String(row[nameKey]  || '');
        var kv = String(row[claimKey] !== undefined ? row[claimKey] : '');
        var safeKv = kv.replace(/&/g,'&amp;').replace(/"/g,'&quot;');

            + '<span style="font-size:0.8rem;color:#334155;">' + _a2uiSanitize(dname) + '</span>'
            + '<button data-kv="' + safeKv + '" data-an="' + _a2uiSanitize(actNode) + '" data-km="' + _a2uiSanitize(keyMemNode) + '" data-coltype="claim"'
            + ' title="Transfer ownership to me"'
            + ' style="background:transparent;color:#94a3b8;border:1px solid #e2e8f0;border-radius:4px;padding:2px 8px;font-size:0.65rem;font-weight:600;cursor:pointer;white-space:nowrap;"'

        var keyMem2    = col.key_mem_node  || 'resolve_id_mem';
        var rowStatus  = String(row[statusKey] || '');
        var kv2 = String(row[resolveKey] !== undefined ? row[resolveKey] : '');
        var safeKv2 = kv2.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        if (rowStatus === 'Resolved') {
          html += '<td style="padding:6px 12px;border-bottom:1px solid #f1f5f9;">'

      // Optimistic: remove row immediately so delete feels instant
      var tr = btn.closest('tr');
      if (tr) {
        tr.style.transition = 'opacity 0.12s';
        tr.style.opacity = '0';
        setTimeout(function() { if (tr.parentNode) tr.parentNode.removeChild(tr); }, 120);

function _a2uiUpdateChatCard(el, rows) {
  var body = el.querySelector('[data-cc-body]');
  var foot = el.querySelector('[data-cc-foot]');
  var sub  = el.querySelector('[data-cc-sub]');
  if (!body) return;
  var arr = Array.isArray(rows) ? rows : [];
  var sevIco = function(s) { return s==='P1'?'🔴':s==='P2'?'🟠':s==='P3'?'🟡':'⚪'; };
  var stIco  = function(s) { return s==='Claimed'?'🔧':s==='Resolved'?'✅':'🆕'; };
  var sevCol = { P1:'#fef2f2', P2:'#fff7ed', P3:'#fefce8', P4:'#f8fafc' };
  var stCol  = { New:'#eef2ff', Claimed:'#fff7ed', Resolved:'#f0fdf4' };
  var stText = { New:'#4f46e5', Claimed:'#ea580c', Resolved:'#16a34a' };
  var active   = arr.filter(function(r){ return r.status !== 'Resolved'; });
  var resolved = arr.filter(function(r){ return r.status === 'Resolved'; });

  // Update subtitle timestamp
  if (sub) {
    var now = new Date();
    var ts = String(now.getDate()).padStart(2,'0') + ' '
      + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]
      + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    sub.textContent = 'Live · ' + ts;
  }

  // Build section HTML
  var html = '';
  if (active.length === 0) {
    html += '<div style="padding:16px 18px;text-align:center;color:#16a34a;font-size:0.88rem;font-weight:600;">✅ All incidents resolved</div>';
  } else {
    html += '<div style="padding:8px 18px 4px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;">Active Incidents (' + active.length + ')</div>';
    active.forEach(function(r) {
      var bg = sevCol[r.severity] || '#f8fafc';
      html += '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 18px;border-bottom:1px solid #f3f4f6;background:' + bg + ';">'
        + '<div style="font-size:1.1rem;margin-top:2px;flex-shrink:0;">' + sevIco(r.severity) + '</div>'
        + '<div style="flex:1;min-width:0;">'
          + '<div style="font-size:0.72rem;color:#6b7280;font-weight:600;margin-bottom:2px;">'
            + (r.severity || '') + ' · <span style="font-family:monospace;">' + (r.id || '') + '</span>'
          + '</div>'
          + '<div style="font-size:0.85rem;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + _a2uiSanitize(String(r.title||'')) + '</div>'
          + '<div style="margin-top:4px;display:flex;align-items:center;gap:6px;">'
            + '<span style="font-size:0.72rem;padding:2px 8px;border-radius:999px;background:' + (stCol[r.status]||'#f3f4f6') + ';color:' + (stText[r.status]||'#374151') + ';font-weight:600;">' + stIco(r.status) + ' ' + (r.status||'') + '</span>'
            + (r.owner_name ? '<span style="font-size:0.72rem;color:#6b7280;">👤 ' + _a2uiSanitize(String(r.owner_name)) + '</span>' : '<span style="font-size:0.72rem;color:#9ca3af;font-style:italic;">Unassigned</span>')
          + '</div>'
        + '</div>'
        + '</div>';
    });
  }
  if (resolved.length > 0) {
    html += '<div style="padding:6px 18px 4px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-top:4px;">Resolved (' + resolved.length + ')</div>';
    resolved.forEach(function(r) {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 18px;border-bottom:1px solid #f3f4f6;opacity:0.6;">'
        + '<div style="font-size:1rem;flex-shrink:0;">✅</div>'
        + '<div style="flex:1;min-width:0;">'
          + '<div style="font-size:0.72rem;color:#9ca3af;font-family:monospace;">' + (r.id||'') + '</div>'
          + '<div style="font-size:0.82rem;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + _a2uiSanitize(String(r.title||'')) + '</div>'
        + '</div>'
        + '</div>';
    });
  }
  body.innerHTML = html;
  if (foot) {
    foot.innerHTML = '📊 Active: <strong>' + active.length + '</strong> &nbsp;·&nbsp; Resolved: <strong>' + resolved.length + '</strong> &nbsp;·&nbsp; Total: <strong>' + arr.length + '</strong>';
  }
}

function _a2uiBindRowClicks(wrapEl) {
  var elId   = wrapEl.id.replace('a2ui-', '');
  var schema = window.__A2UI_SCHEMA__;
  if (!schema) return;
  var layoutEl;
  for (var i = 0; i < (schema.layout || []).length; i++) {
    if (schema.layout[i].id === elId) { layoutEl = schema.layout[i]; break; }
  }
  if (!layoutEl || !layoutEl.wire || !layoutEl.wire.onRowClick) return;
  var wireExpr = layoutEl.wire.onRowClick;
  wrapEl.querySelectorAll('tbody tr').forEach(function(row) {
    row.addEventListener('click', function() {
      var rowData = {};
      try { rowData = JSON.parse(this.getAttribute('data-row-json') || '{}'); } catch(e) {}
      window._a2uiEngine.bindOutput(wireExpr, rowData);
    });
  });
}

// ─── Boot ─────────────────────────────────────────────────────────────────────

// Boot is CALLABLE (wired-transport v0.1): GAS pages boot on DOMContentLoaded
// as ever; the MCP Apps view calls _a2uiBootWiredSurface(schema) after paint(),
// long after DOMContentLoaded fired.
window._a2uiBootWiredSurface = function(schema) {
  schema = schema || window.__A2UI_SCHEMA__;
  if (!schema || schema.type !== 'a2ui_wired_surface') return;
  window.__A2UI_SCHEMA__ = schema;

  window._a2uiSchema  = schema;
  window._a2uiEngine = new A2UIStateEngine(schema);

  // Input wires: state → DOM props
  (schema.layout || []).forEach(function(el) {
    if (!el.id || !el.wire) return;
    window._a2uiEngine.compileWires(el, _a2uiBridge);
  });

  // Hydrate persisted done-states — after input wires are compiled so setting a
  // value fires its listeners and repaints the checkbox. _hydrating guards the
  // save-echo in _set.
  (function hydrateProgress() {
    var eng = window._a2uiEngine;
    if (!window._A2UI_SLUG || typeof google === 'undefined' || !google.script || !google.script.run) return;
    var anyPersistent = Object.keys(eng.nodes).some(function (id) { return eng.nodes[id]._persist; });
    if (!anyPersistent) return;
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok || !res.data) return;
        eng._hydrating = true;
        try {
          Object.keys(res.data).forEach(function (storeId) {
            if (eng.nodes[storeId] && eng.nodes[storeId]._persist) {
              eng._set(storeId, 'value', res.data[storeId]);
            }
          });
        } finally { eng._hydrating = false; }
      })
      .withFailureHandler(function () {})
      .a2uiLoadProgress(window._A2UI_SLUG, window._A2UI_CLIENT_ID || '');
  })();

  // Output wires: DOM events → state
  (schema.layout || []).forEach(function(el) {
    if (!el.id || !el.wire) return;
    var domEl = document.getElementById('a2ui-' + el.id);
    if (!domEl) return;
    var wire = el.wire;

    Object.keys(wire).forEach(function(prop) {
      var wireExpr = wire[prop];
      if (typeof wireExpr !== 'string' || !wireExpr.startsWith('#')) return;

      if (prop === 'setDone') {
        var csDoneEl = domEl.querySelector('[data-cs-done]');
        if (csDoneEl) csDoneEl.addEventListener('change', function(e) {
          window._a2uiEngine.bindOutput(wireExpr, e.target.checked);
        });
      } else if (prop === 'onChange') {
        var inp = domEl.querySelector('input:not([type=checkbox]),textarea');
        if (inp) inp.addEventListener('input', function(e) {
          window._a2uiEngine.bindOutput(wireExpr, e.target.value);
        });
      } else if (prop === 'onClick') {
        var btn = domEl.querySelector('button');
        if (btn) btn.addEventListener('click', function() {
          window._a2uiEngine.bindOutput(wireExpr, null);
        });
      } else if (prop === 'onToggle') {
        var chk = domEl.querySelector('input[type=checkbox]');
        if (chk) chk.addEventListener('change', function(e) {
          window._a2uiEngine.bindOutput(wireExpr, e.target.checked);
        });
      } else if (prop === 'onRowClick') {
        _a2uiBindRowClicks(domEl);
      } else if (prop === 'onSearch') {
        var ppSearchBtn = domEl.querySelector('[data-pp-search]');
        if (ppSearchBtn) ppSearchBtn.addEventListener('click', function() {
          window._a2uiEngine.bindOutput(wireExpr, null);
        });
        var ppInputEl = domEl.querySelector('[data-pp-input]');
        if (ppInputEl) ppInputEl.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') window._a2uiEngine.bindOutput(wireExpr, null);
        });
      }
    });
  });

  // Step binding: StepNavigator.activeIndex → show/hide elements
  if (schema.stepBinding) {
    var stepParsed = typeof schema.stepBinding === 'string' && schema.stepBinding.startsWith('#')
      ? (function() {
          var inner = schema.stepBinding.slice(1);
          var dot = inner.indexOf('.');
          return dot === -1 ? null : { nodeId: inner.slice(0, dot), property: inner.slice(dot+1) };
        })()
      : null;

    if (stepParsed) {
      window._a2uiEngine.registerListener(stepParsed.nodeId, stepParsed.property, function(idx) {
        document.querySelectorAll('[data-a2ui-step]').forEach(function(el) {
          el.style.display = (parseInt(el.getAttribute('data-a2ui-step'), 10) === idx) ? '' : 'none';
        });
      });
    }
  }

  // Fire onLoad actions
  (schema.actions || []).forEach(function(a) {
    if (a.trigger === 'onLoad') {
      var node = window._a2uiEngine.nodes[a.id];
      if (node && node._run) node._run();
    }
  });

  // Wire live_refresh atoms: poll named action on a timer
  document.querySelectorAll('[data-a2ui-live-refresh]').forEach(function(el) {
    var actionId = el.getAttribute('data-a2ui-live-refresh');
    var interval = parseInt(el.getAttribute('data-interval'), 10) || 30000;
    if (!actionId) return;
    setInterval(function() {
      var node = window._a2uiEngine && window._a2uiEngine.nodes[actionId];
      if (node && node._run) node._run();
    }, interval);
  });

  // presence_surface molecules — self-contained heartbeat + avatar render
  // Identity is passed from the client (set by the me atom scan below) to avoid
  // unreliable Session.getActiveUser() in USER_DEPLOYING+ANYONE mode.
  window._a2uiPingFns = window._a2uiPingFns || [];
  document.querySelectorAll('[data-a2ui-presence-surface]').forEach(function(el) {
    var surfaceId  = el.getAttribute('data-surface-id')  || 'default';
    var threshold  = parseInt(el.getAttribute('data-threshold')  || '90',  10);
    var queryMs    = parseInt(el.getAttribute('data-query-ms')   || '30000', 10);
    var pingMs     = parseInt(el.getAttribute('data-ping-ms')    || '60000', 10);
    var guardSheet = el.getAttribute('data-guard-sheet') || '';
    var avatarEl   = el.querySelector('[data-psurf-avatars]');

    function doPing() {
      var me = window._a2uiMe || {};
      var payload = { surface_id: surfaceId, email: me.email || '', name: me.name || '', photoUrl: me.photoUrl || '' };
      if (guardSheet) payload.guard_sheet = guardSheet;
      google.script.run.a2uiSurfacePresence('ping', payload);
    }
    function doQuery() {
      var qp = { surface_id: surfaceId, threshold: threshold };
      if (guardSheet) qp.guard_sheet = guardSheet;
      google.script.run
        .withSuccessHandler(function(r) {
          if (r && r.ok && avatarEl) _a2uiRenderSurfaceAvatars(avatarEl, r.data || [], surfaceId, guardSheet);
        })
        .a2uiSurfacePresence('query', qp);
    }
    window._a2uiPingFns.push(doPing);
    doPing(); doQuery();
    setInterval(doPing, pingMs);
    setInterval(doQuery, queryMs);
  });

  // me atom — resolve current user identity client-side
  document.querySelectorAll('[data-a2ui-me]').forEach(function(el) {
    var pos      = el.getAttribute('data-position') || 'inline';
    var showName = el.getAttribute('data-show-name') !== '0';
    google.script.run
      .withSuccessHandler(function(r) {
        if (!r || !r.ok || !r.email) return;
        var name  = r.name || r.email;
        var email = r.email;
        // Store identity globally so presence pings can use it
        window._a2uiMe = { email: email, name: name, photoUrl: r.photoUrl || '' };
        // Re-ping immediately now that identity is known
        (window._a2uiPingFns || []).forEach(function(fn) { fn(); });
        var initials = name.trim().split(/\s+/).filter(Boolean).map(function(p) { return p[0]; }).join('').toUpperCase().slice(0, 2) || '?';
        var color = _a2uiHashColor(email);
        var wrapStyle = pos === 'top-right'
          ? 'display:inline-flex;align-items:center;gap:8px;'
          : 'display:inline-flex;align-items:center;gap:8px;';
        var returnUrl = (window._a2uiSchema && window._a2uiSchema._fullUrl) || window.location.href;
        var switchUrl = 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(returnUrl);
        el.innerHTML = '<div title="' + _a2uiSanitize(name + ' · ' + email) + '\nClick to switch account"'
          + ' data-switch-url="' + switchUrl.replace(/"/g, '&quot;') + '"'
          + ' style="width:32px;height:32px;border-radius:50%;background:' + _a2uiSanitize(color) + ';display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:opacity 0.15s;" onmouseover="this.style.opacity=\'0.8\'" onmouseout="this.style.opacity=\'1\'" onclick="window.top.location.href=this.getAttribute(\'data-switch-url\')">'
          + _a2uiSanitize(initials) + '</div>'
          + (showName ? '<span style="font-size:0.8rem;color:#64748b;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + _a2uiSanitize(name) + '</span>' : '');
        el.style.display = 'inline-flex';
        el.style.alignItems = 'center';
        el.style.gap = '8px';
      })
      .a2uiGetMe();
  });

  // Source atom bridge — canvas calls this global directly (same page context, no postMessage needed)
  window._a2uiFlightClick = function(detail) {
    var s = window._a2uiSchema;
    if (!s || !s.layout) return;
    s.layout.forEach(function(el) {
      if (el.wire && el.wire.onFlightClick) {
        window._a2uiEngine.bindOutput(el.wire.onFlightClick, detail);
      }
    });
  };
};

document.addEventListener('DOMContentLoaded', function() {
  window._a2uiBootWiredSurface(window.__A2UI_SCHEMA__);
});
</script>
